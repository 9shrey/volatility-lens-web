name: e2e
on:
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: 15-volatility-lens-web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Build smoke bundle
        env:
          VLENS_PRODUCED_AT: "2024-12-31T00:00:00+00:00"
        run: |
          cd pipeline && python -m pip install -e . -q
          python -m vlens.cli publish --config configs/smoke.yaml --out ../web/public/_smoke_bundle
      - name: Install web deps
        run: corepack enable && cd web && pnpm install
      - name: Install Playwright browsers
        run: cd web && pnpm exec playwright install --with-deps chromium
      - name: Build + start
        run: cd web && pnpm build
      - name: Run Playwright
        env:
          VLENS_DEFAULT_TICKER: SPY
        run: cd web && pnpm exec playwright test
