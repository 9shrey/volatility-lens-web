name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: pipeline } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: |
          python -m pip install -e .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
      - name: Smoke determinism
        env:
          VLENS_PRODUCED_AT: "2024-12-31T00:00:00+00:00"
          VLENS_PIPELINE_GIT_SHA: ${{ github.sha }}
        run: |
          python -m vlens.cli publish --config configs/smoke.yaml --out artifacts/a
          python -m vlens.cli publish --config configs/smoke.yaml --out artifacts/b
          diff -r artifacts/a artifacts/b
          python -m vlens.cli verify --bundle artifacts/a

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit test
        run: pnpm test --run
      - name: Build
        env:
          VLENS_DEFAULT_TICKER: SPY
        run: pnpm build
